<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Shop - Urban Threads</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <nav>
            <h2>Urban Threads</h2>
            <a href="cart.html">Cart</a>

            <div id="left-section">
                <span id="user"></span>
                <button id="logout-btn" onClick="logout()">Logout</button>
            </div>

        </nav>

        <div style="padding:20px;">
            <h1>Shop</h1>

            <input id="search" placeholder="Search products..." style="padding:10px; width:100%; margin:10px 0;">

            <select id="filter" style="padding:10px; width:100%;">
                <option value="all">All Categories</option>
                <option value="Hoodies">Hoodies</option>
                <option value="T-shirts">T-shirts</option>
                <option value="Sneakers">Sneakers</option>
                <option value="Accessories">Accessories</option>
            </select>
        </div>

        <p id="loading" style="padding:20px;">Loading products...</p>

        <div id="products" class="grid"></div>

        <script type="module" src="js/shop.js"></script>
    </body>
</html>
