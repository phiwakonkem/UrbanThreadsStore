<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login - Urban Threads</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav>
        <h2>Urban Threads</h2>
    </nav>

    <div style="padding:40px; max-width:400px; margin:auto;">
        <h2>Login / Sign Up</h2>

        <input id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;">
        <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">

        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
